<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>oci-helper</title>
<style>
:root{--bg:#0f1419;--card:#1a1f2e;--text:#e1e8ed;--accent:#1d9bf0;--danger:#e74c3c;--green:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,sans-serif}
a{color:var(--accent);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:20px}
.header{background:var(--card);padding:16px 24px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.card{background:var(--card);padding:20px;border-radius:8px;margin-bottom:16px}
.card h3{border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:10px;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin-right:8px}
.btn-p{background:var(--accent);color:#fff}
.btn-d{background:var(--danger);color:#fff}
.btn-s{background:var(--green);color:#fff}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
th{color:var(--accent);font-weight:600}
input,select{background:var(--bg);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:8px 12px;border-radius:4px;width:100%;margin-bottom:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.badge{padding:2px 8px;border-radius:4px;font-size:12px}
.badge-running{background:rgba(39,174,96,.2);color:var(--green)}
.badge-stopped{background:rgba(231,76,60,.2);color:var(--danger)}
.badge-terminated{background:rgba(149,165,166,.2);color:#95a5a6}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;background:var(--bg)}
.tab.active{background:var(--accent)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:var(--card);padding:24px;border-radius:8px;min-width:400px;max-width:600px}
#login-form{display:flex;flex-direction:column;gap:12px;padding:40px}
#login-box{max-width:400px;margin:10vh auto}
.hidden{display:none}
</style>
</head>
<body>

<div id="login-box" class="container">
  <div class="card">
    <h3>oci-helper Login</h3>
    <form id="login-form" onsubmit="login(event)">
      <input id="login-user" placeholder="Username" value="admin">
      <input id="login-pass" type="password" placeholder="Password">
      <button class="btn btn-p" type="submit">Login</button>
      <div id="login-err" style="color:var(--danger)"></div>
    </form>
  </div>
</div>

<div id="app" class="container hidden">
  <div class="header">
    <h2>🔧 oci-helper</h2>
    <div>
      <span id="nav-username"></span>
      <button class="btn btn-d" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('tenants')">Tenants</div>
    <div class="tab" onclick="switchTab('instances')">Instances</div>
    <div class="tab" onclick="switchTab('tasks')">Tasks</div>
    <div class="tab" onclick="switchTab('audit')">Audit</div>
  </div>

  <div id="tab-tenants">
    <div class="card">
      <h3>Tenants <button class="btn btn-p" onclick="openModal('tenant-modal')">Add</button></h3>
      <table><thead><tr><th>Name</th><th>Region</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tenant-list"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-instances" class="hidden">
    <div class="card">
      <h3>Instances</h3>
      <table><thead><tr><th>Name</th><th>Shape</th><th>State</th><th>IP</th><th>Tenant</th></tr></thead>
        <tbody id="instance-list"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-tasks" class="hidden">
    <div class="card"><h3>Tasks</h3><table><thead><tr><th>Type</th><th>Status</th><th>Progress</th><th>Message</th></tr></thead>
      <tbody id="task-list"></tbody></table></div>
  </div>

  <div id="tab-audit" class="hidden">
    <div class="card"><h3>Audit Log</h3><table><thead><tr><th>Action</th><th>Detail</th><th>Time</th></tr></thead>
      <tbody id="audit-list"></tbody></table></div>
  </div>
</div>

<div id="tenant-modal" class="modal">
  <div class="modal-box">
    <h3>Add Tenant</h3>
    <form onsubmit="addTenant(event)">
      <input id="t-name" placeholder="Name" required>
      <input id="t-ocid" placeholder="Tenancy OCID" required>
      <input id="t-user" placeholder="User OCID" required>
      <input id="t-region" placeholder="Region" required>
      <input id="t-fp" placeholder="Fingerprint" required>
      <input id="t-key" placeholder="Key Filename (e.g. key.pem)" required>
      <button class="btn btn-p">Save</button>
      <button class="btn" type="button" onclick="closeModal('tenant-modal')">Cancel</button>
    </form>
  </div>
</div>

<script>
const API = '';
let currentTab = 'tenants';

// Auth
async function login(e) {
  e.preventDefault();
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const r = await fetch(API+'/api/login', {method:'POST',headers:{'Authorization':'Basic '+btoa(u+':'+p)}});
  if (r.ok) { loadApp(); return; }
  document.getElementById('login-err').textContent = 'Login failed';
}

async function logout() {
  await fetch(API+'/api/logout', {method:'POST'});
  location.reload();
}

async function api(url, opts) {
  const r = await fetch(API+url, opts);
  if (r.status === 401) { location.reload(); return null; }
  return r;
}

// Load
async function loadApp() {
  document.getElementById('login-box').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadTenants();
  loadInstances();
  loadTasks();
  loadAudit();
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');
  ['tenants','instances','tasks','audit'].forEach(x=>document.getElementById('tab-'+x).classList.add('hidden'));
  document.getElementById('tab-'+t).classList.remove('hidden');
  if(t==='instances') loadInstances();
  if(t==='tasks') loadTasks();
  if(t==='audit') loadAudit();
}

// Tenants
async function loadTenants() {
  const r = await api('/api/tenants'); if (!r) return;
  const list = await r.json();
  document.getElementById('tenant-list').innerHTML = list.map(t => `
    <tr><td>${esc(t.name)}</td><td>${esc(t.region)}</td><td>${esc(t.status)}</td>
    <td><button class="btn btn-s" onclick="syncTenant(${t.id})">Sync</button>
        <button class="btn btn-d" onclick="delTenant(${t.id})">Del</button></td></tr>`).join('');
}

async function addTenant(e) {
  e.preventDefault();
  const body = JSON.stringify({
    name: document.getElementById('t-name').value,
    tenancyOcid: document.getElementById('t-ocid').value,
    userOcid: document.getElementById('t-user').value,
    region: document.getElementById('t-region').value,
    fingerprint: document.getElementById('t-fp').value,
    keyFile: document.getElementById('t-key').value
  });
  await api('/api/tenants', {method:'POST', body});
  closeModal('tenant-modal');
  loadTenants();
}

async function delTenant(id) { if(confirm('Delete?')){await api('/api/tenants/'+id,{method:'DELETE'});loadTenants();loadInstances();} }
async function syncTenant(id) { await api('/api/sync/'+id); loadInstances(); loadTasks(); }

// Instances
async function loadInstances() {
  const r = await api('/api/instances'); if (!r) return;
  const list = await r.json();
  document.getElementById('instance-list').innerHTML = list.map(i => `
    <tr><td>${esc(i.name||i.ocid?.slice(-8))}</td><td>${esc(i.shape)}</td>
    <td><span class="badge badge-${i.state?.toLowerCase()}">${esc(i.state)}</span></td>
    <td>${esc(i.publicIp||'-')}</td><td>${i.tenantId}</td></tr>`).join('');
}

async function loadTasks() {
  const r = await api('/api/tasks'); if (!r) return;
  const list = await r.json();
  document.getElementById('task-list').innerHTML = list.map(t => `
    <tr><td>${esc(t.type)}</td><td>${esc(t.status)}</td><td>${t.progress}%</td><td>${esc(t.message)}</td></tr>`).join('');
}

async function loadAudit() {
  const r = await api('/api/audit'); if (!r) return;
  const list = await r.json();
  document.getElementById('audit-list').innerHTML = list.map(l => `
    <tr><td>${esc(l.action)}</td><td>${esc(l.detail)}</td><td>${new Date(l.createdAt).toLocaleString()}</td></tr>`).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
</script>
</body>
</html>
